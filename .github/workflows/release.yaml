name: abanos-release
on:
  push:
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
  package:
    needs: build
    name: Build for ${{matrix.os}}-${{matrix.arch}}
    runs-on: ${{matrix.os}}
    permissions:
      contents: 'read'
      id-token: 'write'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x86_64]
        include: 
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/abanos
            name: abanos-x86_64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/abanos
            name: abanos-x86_64-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/abanos.exe
            name: abanos-x86_64-windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          toolchain: stable
          target: ${{matrix.target}}
          profile: minimal
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
      - name: Install rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - name: Build binary
        run: cargo build --release --target ${{matrix.target}}
      - name: Upload binary
        uses: actions/upload-artifact@v2
        with:
          name: ${{matrix.name}}
          path: ${{matrix.binary}}
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{secrets.GCP_ABANOS_IO_PROD_PROJECT}}
          workload_identity_provider: ${{secrets.GCP_WORKLOAD_IDENTITY_POOL}}
      - name: Upload to GCS
        uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: ${{matrix.binary}}
          gzip: true
          destination: abanos/release/${{steps.date.outputs.date}}/${{matrix.arch}}/${{matrix.name}}/
